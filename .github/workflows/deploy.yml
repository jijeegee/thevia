name: Deploy

on:
  push:
    branches: [main]

# Required GitHub Secrets:
#   CLOUDFLARE_ACCOUNT_TOKEN - Cloudflare API token with Pages permissions
#   CLOUDFLARE_ACCOUNT_ID    - Cloudflare account ID
#   FLY_API_TOKEN            - Fly.io deploy token

jobs:
  deploy-frontend:
    name: Deploy Frontend to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build keyboard definitions
        run: npm run build:kbs

      - name: Build
        run: npx vite build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_ACCOUNT_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=thevia
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  deploy-backend:
    name: Deploy Backend to Fly.io
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        working-directory: server
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
