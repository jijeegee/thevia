app = "thevia-api"
primary_region = "nrt"

[build]

[env]
  PORT = "3001"
  HOST = "0.0.0.0"
  NODE_ENV = "production"
  STORAGE_TYPE = "r2"
  R2_BUCKET = "thevia-definitions"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
